name: local_infer_core
description: Flutter FFI plugin for local-infer-core — manifest-driven OCR, embeddings, icon index.
version: 0.1.0
repository: https://github.com/SuiltaPico/local-infer-core
license: MIT

environment:
  sdk: ^3.10.0
  flutter: ">=3.16.0"

platforms:
  android:
  windows:

dependencies:
  code_assets: ^1.2.1
  ffi: ^2.1.2
  flutter:
    sdk: flutter
  hooks: ^2.0.2
  path: ^1.9.0

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  assets:
    - assets/catalog.json
  plugin:
    platforms:
      android:
        ffiPlugin: true
      windows:
        ffiPlugin: true
