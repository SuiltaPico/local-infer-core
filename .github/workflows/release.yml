name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_model_packs:
        description: 'Rebuild model packs in this run'
        type: boolean
        default: false
      model_packs_tag:
        description: 'Reuse model packs from this release tag'
        type: string
        default: model-packs-latest
      skip_medium:
        description: 'Skip PP-OCRv6 medium pack (large download)'
        type: boolean
        default: false
      skip_icons:
        description: 'Skip icons.bundled index build (slow)'
        type: boolean
        default: false
      skip_mnn:
        description: 'Skip ONNX to MNN conversion'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_HTTP_MULTIPLEXING: "false"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.95.0'
          targets: x86_64-pc-windows-msvc,aarch64-pc-windows-msvc

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-windows-rust-1.95

      - name: Build Windows native libraries (x64 + arm64, ONNX)
        shell: pwsh
        run: ./scripts/build_release_windows.ps1

      - uses: actions/upload-artifact@v6
        with:
          name: windows-packages
          path: dist/infer-core-windows-*.zip

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # MNN source + arm64 prebuilts + locally built x86_64 libMNN.so live under
      # third_party/mnn/ (gitignored). Cache avoids re-downloading and re-running
      # the expensive CMake build for Android x86_64 on every release tag.
      - name: Cache MNN Android artifacts
        uses: actions/cache@v4
        id: mnn-android-cache
        with:
          path: third_party/mnn
          key: mnn-android-v1-${{ hashFiles('scripts/download_mnn_android.ps1', 'scripts/build_mnn_android_x86_64.ps1') }}-ndk-r27c-mnn-3.6.0
          restore-keys: |
            mnn-android-v1-

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.95.0'
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-android-rust-1.95
          cache-workspace-crates: true

      - uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r27c

      - name: Cache cargo-ndk
        id: cargo-ndk-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-ndk
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
          key: cargo-ndk-v1-rust-1.95-locked

      - name: Install cargo-ndk
        if: steps.cargo-ndk-cache.outputs.cache-hit != 'true'
        run: cargo install cargo-ndk --locked

      - name: Install cmake and ninja
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build

      - name: Build Android native libraries (arm64 + x64, MNN)
        shell: pwsh
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
          NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: ./scripts/build_release_android.ps1 -DownloadMnn

      - uses: actions/upload-artifact@v6
        with:
          name: android-packages
          path: dist/infer-core-android-*.zip

  prepare-model-packs:
    runs-on: windows-latest
    outputs:
      build: ${{ steps.model_pack_strategy.outputs.build }}
      tag: ${{ steps.model_pack_strategy.outputs.tag }}
      cache_tag: ${{ steps.model_pack_strategy.outputs.cache_tag }}
    steps:
      - name: Resolve model pack strategy
        id: model_pack_strategy
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $repo = '${{ github.repository }}'
          $build = $false
          $cacheTag = 'model-packs-latest'

          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            if ('${{ inputs.build_model_packs }}' -eq 'true') { $build = $true }
            if ('${{ inputs.model_packs_tag }}' -ne '') { $cacheTag = '${{ inputs.model_packs_tag }}' }
          }

          function Test-ReleaseHasModelPacks([string]$releaseTag) {
            gh release view $releaseTag --repo $repo *> $null
            if ($LASTEXITCODE -ne 0) { return $false }
            $names = gh release view $releaseTag --repo $repo --json assets -q '.assets[].name'
            if (-not $names) { return $false }
            return @($names | Where-Object { $_ -like 'ocr.*.zip' }).Count -gt 0
          }

          $downloadTag = $cacheTag
          if (-not $build) {
            if (-not (Test-ReleaseHasModelPacks $downloadTag)) {
              Write-Host "Release '$downloadTag' not found; searching fallback..."
              $fallback = $null
              $releases = gh release list --repo $repo --limit 50 --json tagName,isDraft,isPrerelease | ConvertFrom-Json
              foreach ($release in $releases) {
                if ($release.isDraft -or $release.isPrerelease) { continue }
                if ($release.tagName -eq '${{ github.ref_name }}') { continue }
                if (Test-ReleaseHasModelPacks $release.tagName) {
                  $fallback = $release.tagName
                  break
                }
              }

              if ($fallback) {
                Write-Host "Reusing model packs from release $fallback"
                $downloadTag = $fallback
              } elseif ('${{ github.event_name }}' -eq 'push') {
                Write-Host 'No reusable model packs found; building once to bootstrap cache'
                $build = $true
              } else {
                throw "Release '$cacheTag' not found and no fallback release contains model packs"
              }
            }
          }

          "build=$($build.ToString().ToLower())" >> $env:GITHUB_OUTPUT
          "tag=$downloadTag" >> $env:GITHUB_OUTPUT
          "cache_tag=$cacheTag" >> $env:GITHUB_OUTPUT

      - uses: actions/checkout@v6
        if: ${{ steps.model_pack_strategy.outputs.build == 'true' }}

      - name: Install Rust toolchain
        if: ${{ steps.model_pack_strategy.outputs.build == 'true' }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.95.0'

      - name: Cache Rust build artifacts
        if: ${{ steps.model_pack_strategy.outputs.build == 'true' }}
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-model-packs-rust-1.95

      - name: Setup Python
        if: ${{ steps.model_pack_strategy.outputs.build == 'true' }}
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install MNN converter
        if: ${{ steps.model_pack_strategy.outputs.build == 'true' }}
        shell: pwsh
        run: |
          python -m pip install -U pip
          python -m pip install -r requirements.txt

      - name: Setup Node.js
        if: ${{ steps.model_pack_strategy.outputs.build == 'true' }}
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Download ONNX model packs
        if: ${{ steps.model_pack_strategy.outputs.build == 'true' }}
        shell: pwsh
        run: |
          $args = @('-SkipMnn', '-SkipIcons')
          if ('${{ inputs.skip_medium }}' -eq 'true') { $args += '-SkipMedium' }
          ./scripts/download_all_packs.ps1 @args

      - name: Build MNN model packs
        if: ${{ steps.model_pack_strategy.outputs.build == 'true' && (github.event_name != 'workflow_dispatch' || inputs.skip_mnn != true) }}
        shell: pwsh
        run: |
          $args = @()
          if ('${{ inputs.skip_medium }}' -eq 'true') { $args += '-SkipMedium' }
          ./scripts/build_all_mnn_packs.ps1 @args

      - name: Build icons bundled packs
        if: ${{ steps.model_pack_strategy.outputs.build == 'true' && (github.event_name != 'workflow_dispatch' || inputs.skip_icons != true) }}
        shell: pwsh
        run: ./tools/icon-index/build_bundled.ps1 -Quant all

      - name: Package all model packs
        if: ${{ steps.model_pack_strategy.outputs.build == 'true' }}
        shell: pwsh
        run: ./tools/pack/pack-all.ps1 -WriteSha256 -UpdateCatalog

      - name: Download prebuilt model packs
        if: ${{ steps.model_pack_strategy.outputs.build != 'true' }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          gh release download "${{ steps.model_pack_strategy.outputs.tag }}" --repo "${{ github.repository }}" --pattern "ocr.*.zip" --pattern "embed.*.zip" --pattern "icons.*.zip" --pattern "SHA256SUMS.txt" --dir dist --clobber

      - name: Verify model pack artifacts
        shell: pwsh
        run: |
          if (-not (Test-Path 'dist/SHA256SUMS.txt')) {
            throw 'Missing dist/SHA256SUMS.txt'
          }
          if (-not (Get-ChildItem 'dist/ocr.*.zip' -ErrorAction SilentlyContinue)) {
            throw 'Missing dist/ocr.*.zip'
          }
          if (-not (Get-ChildItem 'dist/embed.*.zip' -ErrorAction SilentlyContinue)) {
            throw 'Missing dist/embed.*.zip'
          }
          if (-not (Get-ChildItem 'dist/icons.*.zip' -ErrorAction SilentlyContinue)) {
            throw 'Missing dist/icons.*.zip'
          }

      - uses: actions/upload-artifact@v6
        with:
          name: model-packs
          path: |
            dist/ocr.*.zip
            dist/embed.*.zip
            dist/icons.*.zip
            dist/SHA256SUMS.txt

  publish-model-packs-cache:
    needs: [prepare-model-packs]
    if: ${{ needs.prepare-model-packs.outputs.build == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: model-packs
          path: dist

      - name: Create or update reusable model pack release
        env:
          GH_TOKEN: ${{ github.token }}
          MODEL_PACKS_TAG: ${{ needs.prepare-model-packs.outputs.cache_tag }}
        run: |
          if gh release view "$MODEL_PACKS_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$MODEL_PACKS_TAG" dist/* --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$MODEL_PACKS_TAG" dist/* --repo "$GITHUB_REPOSITORY" --title "Model packs cache ($MODEL_PACKS_TAG)" --notes "Reusable model packs for release workflow."
          fi

  release:
    needs: [build-windows, build-android, prepare-model-packs]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          body: |
            ## infer-core ${{ github.ref_name }}

            ### Native library (desktop — ONNX Runtime)
            - `infer-core-windows-x86_64.zip` — `lib/infer_core.dll` + `lib/infer_core.dll.lib`
            - `infer-core-windows-aarch64.zip` — `lib/infer_core.dll` + `lib/infer_core.dll.lib`

            ### Native library (Android — MNN, no ORT bundled)
            - `infer-core-android-arm64-v8a.zip` — `jniLibs/arm64-v8a/` (`libinfer_core.so` + MNN runtime `.so`)
            - `infer-core-android-x86_64.zip` — `jniLibs/x86_64/*.so` (emulator)

            Android OCR/embed use MNN model packs below.

            ### Model packs — ONNX (desktop)
            - `ocr.paddle.ppocr6-tiny.onnx.fp32` — default chat OCR (~8 MB)
            - `ocr.paddle.ppocr6-small.onnx.fp32` — optional upgrade
            - `ocr.paddle.ppocr6-medium.onnx.fp32` — optional upgrade
            - `embed.mobileclip2-s0.onnx.fp32` — icon embedding（桌面 fp32，不做 ONNX 权重量化）
            - `icons.bundled.v1.mobileclip2-s0.int8` / `.fp32` — bundled icon index

            ### Model packs — MNN (mobile / Android)
            - `ocr.paddle.ppocr6-{tiny,small,medium}.mnn.fp32`
            - `embed.mobileclip2-s0.mnn.{int8,fp32}`

            Icon index (`icons.bundled.v1.*`) is shared across desktop and mobile — not duplicated for MNN.

            SHA256 checksums: `SHA256SUMS.txt`
          files: dist/*
